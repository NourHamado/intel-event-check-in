<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intel Sustainability Summit Check-In</title>
    <!-- Add Font Awesome CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Hero section with Intel branding -->
    <div class="hero">
      <div class="hero-content">
        <img src="img/intel-logo.svg" alt="Intel Logo" class="intel-logo" />
        <h1>Team Sustainability Summit</h1>
        <div class="hero-divider"></div>
        <p>
          <i class="fas fa-leaf"></i> Check-in system for sustainability event
          attendees
        </p>
      </div>
    </div>
    <!-- Attendance tracking -->
    <div class="attendance-tracker">
      <div class="attendance-header">
        <i class="fas fa-users"></i>
        Attendance: <span id="attendeeCount">0</span>/50
      </div>
      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
    <div class="container">
      <!-- Feedback message -->
      <p id="greeting"></p>
      <div id="greetingMessage" style="margin-top: 16px"></div>

      <!-- Check-in form -->
      <form
        class="check-in"
        id="checkInForm"
        aria-label="Attendee Check-In Form"
      >
        <label for="attendeeName" class="form-label">Attendee Name</label>
        <div class="form-group">
          <div class="input-wrapper">
            <input
              type="text"
              id="attendeeName"
              name="attendeeName"
              placeholder="Enter name..."
              required
              aria-label="Attendee Name"
            />
            <label for="teamSelect" class="form-label" style="display: none"
              >Select Team</label
            >
            <select
              id="teamSelect"
              name="team"
              required
              aria-label="Select Team"
            >
              <option value="" disabled selected>Select Team...</option>
              <option value="water">Team Water Wise</option>
              <option value="zero">Team Net Zero</option>
              <option value="power">Team Renewables</option>
            </select>
          </div>
          <button type="submit" id="checkInBtn" aria-label="Check In">
            <i class="fas fa-user-check" aria-hidden="true"></i> Check In
          </button>
        </div>
      </form>

      <!-- Team stats -->
      <div class="team-stats">
        <h2>Team Attendance</h2>
        <div class="teams-grid">
          <div class="team-card water">
            <span class="team-name">🌊 Team Water Wise</span>
            <span class="team-count" id="waterCount">0</span>
          </div>
          <div class="team-card zero">
            <span class="team-name">🌿 Team Net Zero</span>
            <span class="team-count" id="zeroCount">0</span>
          </div>
          <div class="team-card power">
            <span class="team-name">⚡ Team Renewables</span>
            <span class="team-count" id="powerCount">0</span>
          </div>
        </div>
      </div>
      <!-- Attendee list section -->
      <div class="attendee-list-section">
        <h2>Attendee List</h2>
        <ul id="attendeeList" role="list">
          <!-- attendee items will have role="listitem" -->
        </ul>
      </div>
    </div>

    <footer class="footer">
      &copy; 2025 Intel •
      <a
        href="https://www.intel.com/content/www/us/en/corporate-responsibility/2030-goals.html"
        class="footer-link"
        >Sustainability Goals</a
      >
    </footer>

    <script src="script.js"></script>
  </body>
</html>
